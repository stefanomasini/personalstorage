<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Storage</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; }
  .header { background: #fff; border-bottom: 1px solid #ddd; padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 16px; color: #666; white-space: nowrap; }
  .breadcrumb { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
  .breadcrumb a { color: #0066cc; text-decoration: none; font-size: 14px; }
  .breadcrumb a:hover { text-decoration: underline; }
  .breadcrumb .sep { color: #999; font-size: 14px; }
  .container { display: flex; max-width: 1200px; margin: 20px auto; gap: 20px; padding: 0 20px; }
  .main { flex: 1; min-width: 0; }
  .panel { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 16px; width: 340px; flex-shrink: 0; }
  .panel h2 { font-size: 14px; margin-bottom: 12px; color: #555; }
  .panel label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; margin-top: 10px; }
  .panel label:first-of-type { margin-top: 0; }
  .panel input[type="text"], .panel select { width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
  .panel .checkbox-row { display: flex; align-items: center; gap: 6px; margin-top: 10px; }
  .panel .checkbox-row input { margin: 0; }
  .panel .checkbox-row label { margin: 0; }
  .btn { padding: 6px 14px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; }
  .btn:hover { background: #f0f0f0; }
  .btn-primary { background: #0066cc; color: #fff; border-color: #0066cc; }
  .btn-primary:hover { background: #0055aa; }
  .btn-sm { padding: 3px 8px; font-size: 12px; }
  .actions { margin-top: 14px; display: flex; gap: 8px; }
  table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; }
  th { text-align: left; padding: 8px 12px; background: #fafafa; border-bottom: 2px solid #ddd; font-size: 12px; color: #666; text-transform: uppercase; }
  td { padding: 8px 12px; border-bottom: 1px solid #eee; font-size: 13px; }
  tr:last-child td { border-bottom: none; }
  tr.selected { background: #e8f0fe; }
  tr.ignored { opacity: 0.45; }
  .folder-link { color: #0066cc; cursor: pointer; text-decoration: none; font-weight: 500; }
  .folder-link:hover { text-decoration: underline; }
  .leaf-name { color: #b8860b; font-weight: 500; }
  .badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 500; }
  .badge-leaf { background: #fff3cd; color: #856404; }
  .badge-ignore { background: #e2e3e5; color: #6c757d; }
  .badge-template { background: #d1ecf1; color: #0c5460; }
  .usage-tpl { color: #888; font-style: italic; }
  .info { color: #888; font-size: 13px; padding: 20px; text-align: center; }
  .template-section { margin-top: 16px; border-top: 1px solid #eee; padding-top: 12px; }
  .template-section h3 { font-size: 13px; color: #555; margin-bottom: 8px; }
  .template-entry { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; font-size: 12px; }
  .template-entry .te-name { color: #333; }
  .template-entry .te-usage { color: #888; margin-left: 8px; flex: 1; }
  .template-add { display: flex; gap: 4px; margin-top: 6px; }
  .template-add input { flex: 1; padding: 4px 6px; border: 1px solid #ccc; border-radius: 3px; font-size: 12px; }
  .toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 18px; background: #333; color: #fff; border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .toast.error { background: #c0392b; }
  .applied-tpl-info { font-size: 12px; color: #0c5460; background: #d1ecf1; padding: 4px 8px; border-radius: 4px; margin-bottom: 10px; }
  .folder-templates { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 16px; margin-top: 16px; }
  .folder-templates h3 { font-size: 13px; color: #555; margin-bottom: 8px; }
</style>
</head>
<body>

<div class="header">
  <h1>Storage</h1>
  <div class="breadcrumb" id="breadcrumb"></div>
</div>

<div class="container">
  <div class="main">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Usage</th>
          <th>Flags</th>
          <th style="width:50px"></th>
        </tr>
      </thead>
      <tbody id="folder-list"></tbody>
    </table>
    <div class="info" id="empty-msg" style="display:none">No folders found.</div>

    <div class="folder-templates" id="folder-tpl-section">
      <h3>Templates on <span id="folder-tpl-path">/</span></h3>
      <div id="folder-tpl-list"></div>
      <div class="template-add">
        <input type="text" id="ftpl-add-name" placeholder="template">
        <input type="text" id="ftpl-add-sub" placeholder="subfolder">
        <input type="text" id="ftpl-add-usage" placeholder="usage">
        <button class="btn btn-sm" onclick="addFolderTemplateEntry()">+</button>
      </div>
    </div>
  </div>
  <div class="panel" id="editor" style="display:none">
    <h2 id="editor-title">Edit Metadata</h2>
    <div class="applied-tpl-info" id="editor-applied-tpl" style="display:none"></div>
    <label for="ed-usage">Usage</label>
    <input type="text" id="ed-usage" placeholder="Description of folder usage">
    <div class="checkbox-row">
      <input type="checkbox" id="ed-leaf">
      <label for="ed-leaf">Leaf</label>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="ed-ignore">
      <label for="ed-ignore">Ignore</label>
    </div>
    <label for="ed-apply-template">Apply template</label>
    <select id="ed-apply-template">
      <option value="">(none)</option>
    </select>

    <div class="actions">
      <button class="btn btn-primary" onclick="saveMetadata()">Save</button>
      <button class="btn" onclick="deselectFolder()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentPath = "";
let selectedEntry = null;
let currentListData = null;
let parentTemplates = {};
let currentFolderTemplates = {};

async function api(url, opts) {
  const res = await fetch(url, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Request failed");
  return data;
}

function toast(msg, isError) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show" + (isError ? " error" : "");
  setTimeout(() => el.className = "toast", 2500);
}

function buildBreadcrumb(path) {
  const bc = document.getElementById("breadcrumb");
  bc.innerHTML = "";
  const parts = path === "/" ? [""] : path.split("/");
  let accumulated = "";
  parts.forEach((part, i) => {
    if (i > 0) {
      const sep = document.createElement("span");
      sep.className = "sep";
      sep.textContent = "/";
      bc.appendChild(sep);
    }
    const a = document.createElement("a");
    a.href = "#";
    accumulated = i === 0 ? "" : (accumulated ? accumulated + "/" + part : "/" + part);
    const navPath = accumulated;
    a.textContent = i === 0 ? "/" : part;
    a.onclick = (e) => { e.preventDefault(); navigateTo(navPath || "/"); };
    bc.appendChild(a);
  });
}

async function navigateTo(path) {
  currentPath = path === "/" ? "" : path;
  deselectFolder();
  try {
    currentListData = await api("/api/list?path=" + encodeURIComponent(currentPath));
    renderList();
    buildBreadcrumb(currentPath || "/");
    // Pre-fetch parent templates for apply-template dropdown
    parentTemplates = {};
    currentFolderTemplates = {};
    try {
      const tplData = await api("/api/templates?path=" + encodeURIComponent(currentPath));
      parentTemplates = tplData;
      currentFolderTemplates = tplData;
    } catch {}
    renderFolderTemplates();
  } catch (err) {
    toast(err.message, true);
  }
}

function renderList() {
  const tbody = document.getElementById("folder-list");
  const emptyMsg = document.getElementById("empty-msg");
  tbody.innerHTML = "";
  const children = currentListData.children;
  if (children.length === 0) {
    emptyMsg.style.display = "block";
    return;
  }
  emptyMsg.style.display = "none";
  children.forEach((entry) => {
    const tr = document.createElement("tr");
    if (entry.ignore) tr.className = "ignored";
    if (selectedEntry && selectedEntry.path === entry.path) tr.classList.add("selected");
    tr.dataset.path = entry.path;

    // Name
    const tdName = document.createElement("td");
    if (entry.leaf) {
      const span = document.createElement("span");
      span.className = "leaf-name";
      span.textContent = entry.name;
      tdName.appendChild(span);
    } else {
      const a = document.createElement("a");
      a.className = "folder-link";
      a.href = "#";
      a.textContent = entry.name;
      a.onclick = (e) => { e.preventDefault(); navigateTo(entry.path); };
      tdName.appendChild(a);
    }
    tr.appendChild(tdName);

    // Usage
    const tdUsage = document.createElement("td");
    if (entry.usage) {
      if (entry.usageSource === "template") {
        tdUsage.innerHTML = '<span class="usage-tpl">' + escHtml(entry.usage) + '</span>';
      } else {
        tdUsage.textContent = entry.usage;
      }
    }
    tr.appendChild(tdUsage);

    // Flags
    const tdFlags = document.createElement("td");
    if (entry.leaf) tdFlags.innerHTML += '<span class="badge badge-leaf">leaf</span> ';
    if (entry.ignore) tdFlags.innerHTML += '<span class="badge badge-ignore">ignored</span> ';
    if (entry.appliedTemplate) tdFlags.innerHTML += '<span class="badge badge-template">' + escHtml(entry.appliedTemplate) + '</span> ';
    tr.appendChild(tdFlags);

    // Edit
    const tdEdit = document.createElement("td");
    const editBtn = document.createElement("button");
    editBtn.className = "btn btn-sm";
    editBtn.textContent = "Edit";
    editBtn.onclick = () => selectFolder(entry);
    tdEdit.appendChild(editBtn);
    tr.appendChild(tdEdit);

    tbody.appendChild(tr);
  });
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

async function selectFolder(entry) {
  selectedEntry = entry;
  renderList();
  const editor = document.getElementById("editor");
  editor.style.display = "block";
  document.getElementById("editor-title").textContent = entry.name;
  document.getElementById("ed-usage").value = entry.usageSource === "own" ? (entry.usage || "") : "";
  document.getElementById("ed-leaf").checked = entry.leaf;
  document.getElementById("ed-ignore").checked = entry.ignore;

  // Applied template dropdown
  const sel = document.getElementById("ed-apply-template");
  sel.innerHTML = '<option value="">(none)</option>';
  for (const name of Object.keys(parentTemplates)) {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  }
  sel.value = entry.appliedTemplate || "";

  const appliedInfo = document.getElementById("editor-applied-tpl");
  if (entry.appliedTemplate) {
    appliedInfo.textContent = "Template: " + entry.appliedTemplate;
    appliedInfo.style.display = "block";
  } else {
    appliedInfo.style.display = "none";
  }

}

function renderFolderTemplates() {
  document.getElementById("folder-tpl-path").textContent = currentPath || "/";
  const list = document.getElementById("folder-tpl-list");
  list.innerHTML = "";
  for (const [name, subs] of Object.entries(currentFolderTemplates)) {
    for (const [sub, usage] of Object.entries(subs)) {
      const div = document.createElement("div");
      div.className = "template-entry";
      div.innerHTML = '<span class="te-name">' + escHtml(name) + "/" + escHtml(sub) + '</span>'
        + '<span class="te-usage">' + escHtml(usage) + '</span>';
      const btn = document.createElement("button");
      btn.className = "btn btn-sm";
      btn.textContent = "×";
      btn.onclick = () => removeFolderTemplateEntry(name, sub);
      div.appendChild(btn);
      list.appendChild(div);
    }
  }
}

async function addFolderTemplateEntry() {
  const name = document.getElementById("ftpl-add-name").value.trim();
  const sub = document.getElementById("ftpl-add-sub").value.trim();
  const usage = document.getElementById("ftpl-add-usage").value.trim();
  if (!name || !sub || !usage) return toast("Fill all template fields", true);
  try {
    await api("/api/set", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ path: currentPath, template: [name, sub, usage] }),
    });
    document.getElementById("ftpl-add-name").value = "";
    document.getElementById("ftpl-add-sub").value = "";
    document.getElementById("ftpl-add-usage").value = "";
    currentFolderTemplates = await api("/api/templates?path=" + encodeURIComponent(currentPath));
    parentTemplates = currentFolderTemplates;
    renderFolderTemplates();
    toast("Template entry added");
  } catch (err) { toast(err.message, true); }
}

async function removeFolderTemplateEntry(name, sub) {
  try {
    await api("/api/set", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ path: currentPath, removeTemplateEntry: [name, sub] }),
    });
    currentFolderTemplates = await api("/api/templates?path=" + encodeURIComponent(currentPath));
    parentTemplates = currentFolderTemplates;
    renderFolderTemplates();
    toast("Template entry removed");
  } catch (err) { toast(err.message, true); }
}

function deselectFolder() {
  selectedEntry = null;
  document.getElementById("editor").style.display = "none";
  if (currentListData) renderList();
}

async function saveMetadata() {
  if (!selectedEntry) return;
  const payload = { path: selectedEntry.path };
  const usage = document.getElementById("ed-usage").value;
  payload.usage = usage;
  payload.leaf = document.getElementById("ed-leaf").checked;
  payload.ignore = document.getElementById("ed-ignore").checked;

  const applyTpl = document.getElementById("ed-apply-template").value;
  if (applyTpl && applyTpl !== (selectedEntry.appliedTemplate || "")) {
    payload.applyTemplate = applyTpl;
  } else if (!applyTpl && selectedEntry.appliedTemplate) {
    payload.applyTemplate = false;
  }

  try {
    await api("/api/set", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    toast("Metadata saved");
    await navigateTo(currentPath || "/");
  } catch (err) {
    toast(err.message, true);
  }
}

navigateTo("/");
</script>
</body>
</html>
